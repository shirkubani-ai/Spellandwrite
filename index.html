<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>בובי - מרכז הלמידה</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --success: #22c55e; --error: #ef4444; --bg: #f8fafc; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Assistant', sans-serif; background: #eef2ff; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; width: 100vw; overflow: hidden; }
        
        .app-container { background: white; width: 100%; height: 100%; max-width: 500px; display: flex; flex-direction: column; padding: 20px; text-align: center; position: relative; }
        @media (min-width: 500px) { .app-container { height: 95vh; border-radius: 40px; border: 8px solid #fff; box-shadow: 0 20px 50px rgba(0,0,0,0.1); } }

        .exit-btn { position: absolute; top: 20px; left: 20px; background: #f1f5f9; border: none; border-radius: 50%; width: 40px; height: 40px; font-weight: bold; cursor: pointer; color: #64748b; display: none; z-index: 10; }

        .bot-icon { width: 80px; height: 80px; margin: 0 auto 10px; background: #e0e7ff; border-radius: 50%; display: flex; justify-content: center; align-items: center; border: 3px solid var(--primary); }
        .bubble { background: var(--primary); color: white; border-radius: 20px; padding: 12px; margin-bottom: 15px; font-weight: 700; font-size: 1rem; min-height: 60px; display: flex; align-items: center; justify-content: center; position: relative; }

        .sentence { font-size: 1.8rem; font-weight: 800; margin: 20px 0; color: #1e293b; }
        .gap { color: var(--primary); border-bottom: 4px dashed var(--primary); padding: 0 8px; }
        .gap.correct { color: var(--success); border: 2px solid var(--success); border-radius: 10px; }
        .gap.wrong { color: var(--error); border: 2px solid var(--error); border-radius: 10px; }

        .btn { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 20px; font-size: 1.2rem; font-weight: 800; cursor: pointer; box-shadow: 0 5px 0 #4338ca; width: 100%; margin-bottom: 12px; }
        .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #4338ca; }
        .btn-secondary { background: #94a3b8; box-shadow: 0 5px 0 #64748b; margin-top: 5px; font-size: 1rem; }
        
        .opt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .opt-btn { background: white; color: var(--primary); border: 2px solid #e2e8f0; box-shadow: 0 5px 0 #cbd5e1; }

        .progress-bar { width: 100%; height: 6px; background: #e2e8f0; border-radius: 10px; margin-bottom: 10px; display: none; }
        .progress-fill { height: 100%; background: var(--success); width: 0%; transition: 0.3s; }

        .report-card { text-align: right; background: #f8fafc; padding: 15px; border-radius: 15px; max-height: 300px; overflow-y: auto; font-size: 0.9rem; border: 1px solid #e2e8f0; }
        .report-item { margin-bottom: 8px; border-bottom: 1px solid #e2e8f0; padding-bottom: 4px; }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="app-container">
    <button class="exit-btn" id="global-exit" onclick="location.reload()">X</button>
    <div class="progress-bar" id="p-bar-container"><div class="progress-fill" id="p-fill"></div></div>
    
    <div class="header">
        <div class="bot-icon">
            <svg viewBox="0 0 24 24" width="50" height="50" fill="none" stroke="#6366f1" stroke-width="2"><rect x="3" y="11" width="18" height="10" rx="2"></rect><circle cx="12" cy="5" r="2"></circle><path d="M12 7v4"></path></svg>
        </div>
        <div class="bubble" id="speech">היי! אני בובי. רוצים אבחון מהיר או לבחור תרגול בעצמכם?</div>
    </div>

    <div class="content-area">
        <div id="screen-diag">
            <textarea id="diag-input" style="width:100%; height:80px; border-radius:15px; border:2px solid var(--primary); padding:10px; font-family:inherit; margin-bottom:10px;" placeholder="הקלידו משפט לאבחון..."></textarea>
            <button class="btn" onclick="runAnalysis()">בצע אבחון 🔍</button>
            <button class="btn btn-secondary" onclick="showMap()">דלג על הקלדה - בחר תרגול ➔</button>
        </div>

        <div id="screen-map" class="hidden">
            <h3 style="margin-top:0">בחרו נושא לתרגול:</h3>
            <button class="btn" style="background:#16a34a; box-shadow:0 5px 0 #15803d" onclick="prepZone('roots')">🌲 יער השורשים</button>
            <button class="btn" style="background:#2563eb; box-shadow:0 5px 0 #1e40af" onclick="prepZone('templates')">🏭 מפעל התבניות</button>
            <button class="btn" style="background:#7c3aed; box-shadow:0 5px 0 #5b21b6" onclick="prepZone('phonetic')">🦇 מערת הצלילים</button>
        </div>

        <div id="screen-amount" class="hidden">
            <h3>כמה תרגילים תרצו לעשות?</h3>
            <button class="btn opt-btn" onclick="startGame(5)">5 תרגילים (מהיר)</button>
            <button class="btn opt-btn" onclick="startGame(10)">10 תרגילים (בינוני)</button>
            <button class="btn opt-btn" onclick="startGame(99)">כל התרגילים! 💪</button>
        </div>

        <div id="screen-game" class="hidden">
            <div class="sentence" id="q-text"></div>
            <div class="opt-grid" id="opt-grid"></div>
        </div>

        <div id="screen-report" class="hidden">
            <h2 id="final-title">כל הכבוד!</h2>
            <button class="btn btn-secondary" onclick="toggleReport()">הצג דוח להורים 📋</button>
            <div id="parent-report" class="report-card hidden"></div>
            <button class="btn" style="background:var(--success); margin-top:15px;" onclick="location.reload()">חזרה לתפריט</button>
        </div>
    </div>
</div>

<script>
    const questionsBank = {
        roots: [
            { q: "אבא ____ לעבודה", opts: ["הלך", "אלך"], ans: "הלך", hint: "משפחת הליכה מתחילה ב-ה'" },
            { q: "אנחנו ____ לים", opts: ["הולכים", "אולכים"], ans: "הולכים", hint: "הולכים מתחיל ב-ה'" },
            { q: "הילד ____ סיפור", opts: ["כותב", "קוטב"], ans: "כותב", hint: "כתיבה היא ב-כ'" },
            { q: "שלחתי ____ לסבתא", opts: ["מכתב", "מקתב"], ans: "מכתב", hint: "מכתב הוא משורש כ.ת.ב" },
            { q: "היא ____ מהר", opts: ["הלכה", "אלכה"], ans: "הלכה", hint: "הלכה מתחילה ב-ה'" },
            { q: "הסופר ____ ספר", opts: ["כתב", "קתב"], ans: "כתב", hint: "כתב הוא ב-כ'" },
            { q: "יצאנו ל____", opts: ["הליכה", "אליכה"], ans: "הליכה", hint: "הליכה ב-ה'" },
            { q: "הם ____ לביקור", opts: ["הלכו", "אלכו"], ans: "הלכו", hint: "הלכו ב-ה'" }
        ],
        templates: [
            { q: "אתמול אכל____ תפוח", opts: ["תי", "טי"], ans: "תי", hint: "עבר (אני) נגמר ב-תי" },
            { q: "שיחק____ בחצר", opts: ["תי", "טי"], ans: "תי", hint: "שיחקתי נגמר ב-תי" },
            { q: "רצ____ מהר מאוד", opts: ["תי", "טי"], ans: "תי", hint: "רצתי נגמר ב-תי" },
            { q: "ראי____ סרט", opts: ["תי", "טי"], ans: "תי", hint: "ראיתי נגמר ב-תי" }
        ],
        phonetic: [
            { q: "אני __והב שוקולד", opts: ["א", "ע"], ans: "א", hint: "אוהב מתחיל ב-א'" },
            { q: "באתי __ם אמא", opts: ["ע", "א"], ans: "ע", hint: "עם חברים זה ב-ע'" },
            { q: "ה__לפון מצלצל", opts: ["ט", "ת"], ans: "ט", hint: "טלפון ב-ט'" },
            { q: "יש לי __לב", opts: ["כ", "ק"], ans: "כ", hint: "כלב ב-כ'" }
        ]
    };

    let currentPool = [];
    let sessionQs = [];
    let currentIdx = 0;
    let errorLog = [];

    function speak(t) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(t);
        u.lang = 'he-IL'; u.rate = 0.9; u.pitch = 1.2;
        window.speechSynthesis.speak(u);
    }

    function runAnalysis() {
        const val = document.getElementById('diag-input').value;
        if(!val) return;
        let z = 'phonetic';
        if(val.includes('אלכ') || val.includes('אלך')) z = 'roots';
        if(val.includes('טי')) z = 'templates';
        speak("ניתוח הושלם. בואו נבחר כמות תרגילים.");
        prepZone(z);
    }

    function showMap() {
        document.getElementById('screen-diag').classList.add('hidden');
        document.getElementById('screen-map').classList.remove('hidden');
    }

    function prepZone(key) {
        currentPool = [...questionsBank[key]].sort(() => Math.random() - 0.5);
        document.getElementById('screen-diag').classList.add('hidden');
        document.getElementById('screen-map').classList.add('hidden');
        document.getElementById('screen-amount').classList.remove('hidden');
    }

    function startGame(amt) {
        sessionQs = currentPool.slice(0, amt);
        currentIdx = 0; errorLog = [];
        document.getElementById('screen-amount').classList.add('hidden');
        document.getElementById('screen-game').classList.remove('hidden');
        document.getElementById('global-exit').style.display = 'block';
        document.getElementById('p-bar-container').style.display = 'block';
        loadQuestion();
    }

    function loadQuestion() {
        if(currentIdx >= sessionQs.length) return showFinal();
        const data = sessionQs[currentIdx];
        document.getElementById('p-fill').style.width = `${(currentIdx / sessionQs.length) * 100}%`;
        document.getElementById('q-text').innerHTML = data.q.replace("____", `<span class="gap">?</span>`);
        speak("בחרו את התשובה.");
        
        const grid = document.getElementById('opt-grid');
        grid.innerHTML = '';
        data.opts.forEach(o => {
            const b = document.createElement('button');
            b.className = 'btn opt-btn'; b.innerText = o;
            b.onclick = () => {
                if(o === data.ans) {
                    document.getElementById('q-text').innerHTML = data.q.replace("____", `<span class="gap correct">${o}</span>`);
                    speak("נכון מאוד!");
                    setTimeout(() => { currentIdx++; loadQuestion(); }, 1200);
                } else {
                    document.getElementById('q-text').innerHTML = data.q.replace("____", `<span class="gap wrong">${o}</span>`);
                    speak(data.hint);
                    errorLog.push({q: data.q, user: o, correct: data.ans});
                    setTimeout(() => { document.getElementById('q-text').innerHTML = data.q.replace("____", `<span class="gap">?</span>`); }, 1800);
                }
            };
            grid.appendChild(b);
        });
    }

    function showFinal() {
        document.getElementById('screen-game').classList.add('hidden');
        document.getElementById('screen-report').classList.remove('hidden');
        document.getElementById('p-fill').style.width = '100%';
        speak("סיימנו! הייתם מעולים.");
        
        let rDiv = document.getElementById('parent-report');
        if(errorLog.length === 0) {
            rDiv.innerHTML = "<b>מושלם! לא היו טעויות בתרגול הזה.</b>";
        } else {
            rDiv.innerHTML = "<b>פירוט טעויות לחיזוק:</b><br><br>";
            errorLog.forEach(err => {
                rDiv.innerHTML += `<div class="report-item">המשפט: ${err.q.replace('____', '___')}<br>הילד בחר: <span style="color:red">${err.user}</span> | נכון: <span style="color:green">${err.correct}</span></div>`;
            });
        }
    }

    function toggleReport() {
        document.getElementById('parent-report').classList.toggle('hidden');
    }
</script>
</body>
</html>
