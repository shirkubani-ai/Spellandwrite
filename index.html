<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>בובי המדבר - 50 שלבים</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --success: #22c55e; --error: #ef4444; --bg: #f8fafc; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Assistant', sans-serif; background: #eef2ff; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; width: 100vw; overflow: hidden; }
        
        .app-container { background: white; width: 100%; height: 100%; max-width: 500px; display: flex; flex-direction: column; padding: 20px; text-align: center; position: relative; }
        @media (min-width: 500px) { .app-container { height: 95vh; border-radius: 40px; border: 8px solid #fff; box-shadow: 0 20px 50px rgba(0,0,0,0.1); } }

        .bot-icon { width: 100px; height: 100px; margin: 0 auto 10px; background: #e0e7ff; border-radius: 50%; display: flex; justify-content: center; align-items: center; border: 4px solid var(--primary); transition: 0.4s; }
        .bubble { background: var(--primary); color: white; border-radius: 20px; padding: 12px; margin-bottom: 15px; font-weight: 700; font-size: 1.1rem; line-height: 1.4; position: relative; min-height: 80px; display: flex; align-items: center; justify-content: center; }
        .bubble::after { content: ''; position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%); border-top: 10px solid var(--primary); border-left: 10px solid transparent; border-right: 10px solid transparent; }

        .sentence { font-size: 1.8rem; font-weight: 800; margin: 20px 0; color: #1e293b; line-height: 1.3; }
        .gap { color: var(--primary); border-bottom: 4px dashed var(--primary); padding: 0 8px; transition: 0.3s; }
        .gap.correct { color: var(--success); border-bottom: none; border: 3px solid var(--success); border-radius: 12px; }
        .gap.wrong { color: var(--error); border-bottom: none; border: 3px solid var(--error); border-radius: 12px; animation: shake 0.4s; }

        .btn { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 25px; font-size: 1.3rem; font-weight: 800; cursor: pointer; box-shadow: 0 6px 0 #4338ca; width: 100%; margin-bottom: 12px; transition: 0.1s; }
        .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #4338ca; }
        .opt-btn { background: white; color: var(--primary); border: 3px solid #e2e8f0; box-shadow: 0 6px 0 #cbd5e1; }

        .progress-bar { width: 100%; height: 8px; background: #e2e8f0; border-radius: 10px; margin-bottom: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--success); width: 0%; transition: 0.5s; }

        .hidden { display: none; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
    </style>
</head>
<body>

<div class="app-container" id="game-box">
    <div class="progress-bar" id="p-bar-container" style="display:none;"><div class="progress-fill" id="p-fill"></div></div>
    
    <div class="header">
        <div class="bot-icon" id="bot-visual">
            <svg viewBox="0 0 24 24" width="60" height="60" fill="none" stroke="#6366f1" stroke-width="2"><rect x="3" y="11" width="18" height="10" rx="2"></rect><circle cx="12" cy="5" r="2"></circle><path d="M12 7v4"></path><line x1="8" y1="16" x2="8" y2="16"></line><line x1="16" y1="16" x2="16" y2="16"></line></svg>
        </div>
        <div class="bubble" id="speech">היי! אני בובי. בואו נתחיל באבחון הכתיבה שלכם!</div>
    </div>

    <div class="content-area">
        <div id="screen-diag">
            <textarea id="diag-input" style="width:100%; height:100px; border-radius:20px; border:3px solid var(--primary); padding:15px; font-family:inherit; font-size:1.1rem; margin-bottom:15px;" placeholder="כתבו לי משפט קצר (למשל: אני הלכתי לאכול)"></textarea>
            <button class="btn" onclick="runAnalysis()">בוא נתחיל! 🚀</button>
        </div>

        <div id="screen-map" class="hidden">
            <button class="btn" style="background:#16a34a; box-shadow:0 6px 0 #15803d" onclick="startZone('roots')">🌲 יער השורשים</button>
            <button class="btn" style="background:#2563eb; box-shadow:0 6px 0 #1e40af" onclick="startZone('templates')">🏭 מפעל התבניות</button>
            <button class="btn" style="background:#7c3aed; box-shadow:0 6px 0 #5b21b6" onclick="startZone('phonetic')">Bat מערת הצלילים</button>
        </div>

        <div id="screen-game" class="hidden">
            <div class="sentence" id="q-text"></div>
            <div id="opt-grid"></div>
        </div>

        <div id="screen-report" class="hidden">
            <h2 style="color:var(--primary)">כל הכבוד! 🏆</h2>
            <div id="report-content" style="text-align:right; background:#f1f5f9; padding:20px; border-radius:20px; font-size:1.2rem;"></div>
            <button class="btn" style="background:var(--success); margin-top:20px;" onclick="location.reload()">משחק חדש</button>
        </div>
    </div>
</div>

<script>
    const questionsBank = {
        roots: [
            { q: "אבא ____ לעבודה", opts: ["הלך", "אלך"], ans: "הלך", hint: "במשפחת הליכה תמיד מתחילים ב-הא" },
            { q: "אנחנו ____ לים", opts: ["הולכים", "אולכים"], ans: "הולכים", hint: "הולכים מתחיל ב-הא" },
            { q: "היא ____ מהר", opts: ["הלכה", "אלכה"], ans: "הלכה", hint: "הלכה שייכת למשפחת ה.ל.כ" },
            { q: "יצאנו ל____", opts: ["הליכה", "אליכה"], ans: "הליכה", hint: "הליכה כותבים ב-הא" },
            { q: "הם ____ לביקור", opts: ["הלכו", "אלכו"], ans: "הלכו", hint: "הלכו מתחיל ב-הא" },
            { q: "אל ת____ לשם", opts: ["תלך", "תלכ"], ans: "תלך", hint: "בסוף המילה תלך יש כף סופית" },
            { q: "הילד ____ לאיבוד", opts: ["הלך", "אלך"], ans: "הלך", hint: "הלך מתחיל ב-הא" },
            { q: "הילד ____ סיפור", opts: ["כותב", "קוטב"], ans: "כותב", hint: "כתיבה היא תמיד באות כף" },
            { q: "שלחתי ____ לסבתא", opts: ["מכתב", "מקתב"], ans: "מכתב", hint: "מכתב הוא משורש כ.ת.ב" },
            { q: "אנחנו ____ ביומן", opts: ["כותבים", "קוטבים"], ans: "כותבים", hint: "כותבים מתחיל ב-כף" },
            { q: "יש לי ____ יפה", opts: ["כתב", "קתב"], ans: "כתב", hint: "כתב יד כותבים ב-כף" },
            { q: "היא ____ הודעה", opts: ["כותבת", "קוטבת"], ans: "כותבת", hint: "כותבת מתחילה ב-כף" },
            { q: "קיבלתי ____ חדש", opts: ["מכתב", "מקתב"], ans: "מכתב", hint: "מכתב כותבים ב-כף" },
            { q: "הסופר ____ ספר", opts: ["כתב", "קתב"], ans: "כתב", hint: "כתב הוא משורש כ.ת.ב" },
            { q: "הם ____ במחברת", opts: ["כותבים", "קוטבים"], ans: "כותבים", hint: "כותבים מתחיל ב-כף" },
            { q: "ה____ על הלוח", opts: ["כתובת", "קתובת"], ans: "כתובת", hint: "כתובת כותבים ב-כף" }
        ],
        templates: [
            { q: "אתמול אכל____ תפוח", opts: ["תי", "טי"], ans: "תי", hint: "כשאני מספר על עצמי בעבר - זה תמיד תיו ויוד" },
            { q: "שיחק____ בחצר", opts: ["תי", "טי"], ans: "תי", hint: "שיחקתי נגמר ב-תי" },
            { q: "רצ____ מהר מאוד", opts: ["תי", "טי"], ans: "תי", hint: "רצתי נגמר ב-תי" },
            { q: "קפצ____ לשלולית", opts: ["תי", "טי"], ans: "תי", hint: "קפצתי נגמר ב-תי" },
            { q: "ראי____ סרט מצחיק", opts: ["תי", "טי"], ans: "תי", hint: "ראיתי נגמר ב-תי" },
            { q: "בני____ מגדל בקוביות", opts: ["תי", "טי"], ans: "תי", hint: "בניתי נגמר ב-תי" },
            { q: "שמע____ שיר יפה", opts: ["תי", "טי"], ans: "תי", hint: "שמעתי נגמר ב-תי" },
            { q: "קני____ גלידה טעימה", opts: ["תי", "טי"], ans: "תי", hint: "קניתי נגמר ב-תי" },
            { q: "צייר____ ציור יפה", opts: ["תי", "טי"], ans: "תי", hint: "ציירתי נגמר ב-תי" },
            { q: "ישנ____ מצוין הלילה", opts: ["תי", "טי"], ans: "תי", hint: "ישנתי נגמר ב-תי" },
            { q: "שתי____ מים קרים", opts: ["תי", "טי"], ans: "תי", hint: "שתיתי נגמר ב-תי" },
            { q: "מצא____ מטבע ברחוב", opts: ["תי", "טי"], ans: "תי", hint: "מצאתי נגמר ב-תי" },
            { q: "עלי____ על העץ", opts: ["תי", "טי"], ans: "תי", hint: "עליתי נגמר ב-תי" },
            { q: "הלכ____ לישון מוקדם", opts: ["תי", "טי"], ans: "תי", hint: "הלכתי נגמר ב-תי" },
            { q: "סגר____ את הדלת", opts: ["תי", "טי"], ans: "תי", hint: "סגרתי נגמר ב-תי" },
            { q: "פתח____ את החלון", opts: ["תי", "טי"], ans: "תי", hint: "פתחתי נגמר ב-תי" },
            { q: "לבש____ חולצה נקייה", opts: ["תי", "טי"], ans: "תי", hint: "לבשתי נגמר ב-תי" }
        ],
        phonetic: [
            { q: "אני __והב שוקולד", opts: ["א", "ע"], ans: "א", hint: "המילה אוהב מתחילה ב-אלף" },
            { q: "באתי __ם אמא לגינה", opts: ["ע", "א"], ans: "ע", hint: "עם חברים כותבים ב-עין" },
            { q: "ה__לפון מצלצל", opts: ["ט", "ת"], ans: "ט", hint: "טלפון כותבים ב-טית" },
            { q: "קניתי __יק חדש", opts: ["ת", "ט"], ans: "ת", hint: "תיק לבית ספר כותבים ב-תיו" },
            { q: "יש לי __לב חמוד", opts: ["כ", "ק"], ans: "כ", hint: "כלב כותבים ב-כף" },
            { q: "השמש __ולה בבוקר", opts: ["ע", "א"], ans: "ע", hint: "לעלות למעלה זה ב-עין" },
            { q: "אני __וכל ארוחת בוקר", opts: ["או", "עו"], ans: "או", hint: "לאכול זה ב-אלף" },
            { q: "יש __נן בשמיים", opts: ["ע", "א"], ans: "ע", hint: "ענן מתחיל ב-עין" },
            { q: "ה__פוח אדום", opts: ["ת", "ט"], ans: "ת", hint: "תפוח מתחיל ב-תיו" },
            { q: "השוקולד מת__ק", opts: ["וק", "וכ"], ans: "וק", hint: "מתוק נגמר ב-קוף" },
            { q: "ה__רנגול קורא", opts: ["ת", "ט"], ans: "ת", hint: "תרנגול מתחיל ב-תיו" },
            { q: "אני __וניה", opts: ["א", "ע"], ans: "א", hint: "אונייה כותבים ב-אלף" },
            { q: "ה__ור צהוב", opts: ["א", "ע"], ans: "א", hint: "אור מתחיל ב-אלף" },
            { q: "ה__וגה טעימה", opts: ["ע", "א"], ans: "ע", hint: "עוגה מתחילה ב-עין" },
            { q: "יש לי __יק עם ספרים", opts: ["ת", "ט"], ans: "ת", hint: "תיק כותבים ב-תיו" },
            { q: "ה__ול צהוב בים", opts: ["ח", "כ"], ans: "ח", hint: "חול כותבים ב-חית" },
            { q: "ה__רח פורח", opts: ["פ", "כ"], ans: "פ", hint: "פרח מתחיל ב-פה" }
        ]
    };

    let sessionQs = [];
    let currentIdx = 0;
    let errors = 0;

    function speak(text) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'he-IL'; u.rate = 0.85; u.pitch = 1.2;
        window.speechSynthesis.speak(u);
    }

    function updateSpeech(text) {
        document.getElementById('speech').innerText = text;
        speak(text);
    }

    function runAnalysis() {
        const val = document.getElementById('diag-input').value;
        if(!val) return;
        let z = 'phonetic';
        if(val.includes('אלכ') || val.includes('אלך')) z = 'roots';
        if(val.includes('טי')) z = 'templates';
        updateSpeech("הכנתי לנו אימון מעולה! בואו נתחיל.");
        setTimeout(() => startZone(z), 2000);
    }

    function startZone(key) {
        sessionQs = [...questionsBank[key]].sort(() => Math.random() - 0.5);
        currentIdx = 0; errors = 0;
        document.getElementById('screen-diag').classList.add('hidden');
        document.getElementById('screen-map').classList.add('hidden');
        document.getElementById('screen-game').classList.remove('hidden');
        document.getElementById('p-bar-container').style.display = 'block';
        loadQuestion();
    }

    function loadQuestion() {
        if(currentIdx >= sessionQs.length) return showReport();
        const data = sessionQs[currentIdx];
        document.getElementById('p-fill').style.width = `${(currentIdx / sessionQs.length) * 100}%`;
        updateSpeech("מה המילה הנכונה למשפט?");
        renderSentence("?"); 
        const grid = document.getElementById('opt-grid');
        grid.innerHTML = '';
        data.opts.forEach(o => {
            const b = document.createElement('button');
            b.className = 'btn opt-btn'; b.innerText = o;
            b.onclick = () => {
                if(o === data.ans) {
                    renderSentence(o, "correct");
                    updateSpeech("מצוין! אתם אלופים.");
                    document.getElementById('bot-visual').style.background = "#dcfce7";
                    setTimeout(() => { currentIdx++; document.getElementById('bot-visual').style.background = "#e0e7ff"; loadQuestion(); }, 1500);
                } else {
                    renderSentence(o, "wrong");
                    updateSpeech(data.hint);
                    errors++;
                    setTimeout(() => { renderSentence("?"); }, 2000);
                }
            };
            grid.appendChild(b);
        });
    }

    function renderSentence(word, status = "") {
        const data = sessionQs[currentIdx];
        document.getElementById('q-text').innerHTML = data.q.replace("____", `<span class="gap ${status}">${word}</span>`);
    }

    function showReport() {
        document.getElementById('p-fill').style.width = '100%';
        document.getElementById('screen-game').classList.add('hidden');
        document.getElementById('screen-report').classList.remove('hidden');
        const msg = errors === 0 ? "הייתם מושלמים! הכל נכון." : `סיימנו! היו לנו ${errors} טעויות, אבל למדנו המון.`;
        updateSpeech(msg);
        document.getElementById('report-content').innerHTML = `<h3>${msg}</h3><p>מומלץ להמשיך להתאמן כדי לזכור את כל המילים!</p>`;
    }
</script>
</body>
</html>
