<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>בובי - חבר לכתיבה (הגרסה עם הדמות)</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background: #EEF2FF; direction: rtl; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: white; width: 95%; max-width: 450px; padding: 25px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); text-align: center; position: relative; max-height: 90vh; overflow-y: auto; }
        .hidden { display: none !important; }
        
        /* אזור הדמות והבועה */
        .bot-area { display: flex; flex-direction: column; align-items: center; margin-bottom: 20px; }
        .bot-visual { width: 100px; height: 100px; transition: transform 0.3s ease; margin-bottom: 10px; }
        .bot-visual svg { width: 100%; height: 100%; }
        
        /* בועת דיבור משופרת */
        .bot-head { background: #6366F1; color: white; padding: 15px; border-radius: 20px; font-weight: bold; font-size: 1.1rem; position: relative; width: 100%; box-sizing: border-box; }
        .bot-head::before { content: ''; position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); border-width: 10px; border-style: solid; border-color: transparent transparent #6366F1 transparent; }

        .btn { background: #6366F1; color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; margin: 8px 0; font-size: 1.1rem; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn:active { transform: scale(0.98); opacity: 0.9; }
        .btn-exit { position: absolute; top: 10px; left: 10px; background: #EF4444; color: white; border: none; border-radius: 50%; width: 35px; height: 35px; cursor: pointer; font-weight: bold; z-index: 10; display: flex; align-items: center; justify-content: center; text-decoration: none; }
        
        .sentence { font-size: 1.7rem; margin: 25px 0; min-height: 60px; color: #1E293B; line-height: 1.4; }
        .gap { color: var(--primary); border-bottom: 4px dashed var(--primary); padding: 0 8px; transition: 0.2s; }
        
        /* צבעים לתשובות */
        .correct-ans { color: white !important; background-color: #22C55E !important; border: none !important; border-radius: 10px; padding: 2px 10px; }
        .wrong-ans { color: white !important; background-color: #EF4444 !important; border: none !important; border-radius: 10px; padding: 2px 10px; }

        .correct { color: #22C55E; font-weight: 800; border: 3px solid #22C55E; padding: 2px 10px; border-radius: 10px; }
        .wrong { color: #EF4444; font-weight: 800; border: 3px solid #EF4444; padding: 2px 10px; border-radius: 10px; }
        
        textarea { width: 100%; height: 80px; border: 2px solid #DDD; border-radius: 12px; padding: 12px; margin-bottom: 10px; resize: none; font-size: 1rem; }
        .parent-log { text-align: right; background: #F1F5F9; padding: 15px; border-radius: 12px; margin-top: 15px; font-size: 0.9rem; border: 1px solid #CBD5E1; }
        
        /* אנימציית קפיצה */
        @keyframes jump { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        .bot-jump { animation: jump 0.5s ease; }
    </style>
</head>
<body>

<div class="card">
    <button id="x-btn" class="hidden btn-exit" onclick="location.reload()">X</button>
    
    <div class="bot-area">
        <div class="bot-visual" id="bot-visual">
            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="25" y="40" width="50" height="50" rx="10" fill="#6366F1"/>
                <circle cx="50" cy="20" r="10" fill="#CBD5E1"/>
                <rect x="45" y="25" width="10" height="15" fill="#CBD5E1"/>
                <circle cx="40" cy="55" r="5" fill="white"/>
                <circle cx="60" cy="55" r="5" fill="white"/>
                <circle cx="40" cy="55" r="2.5" fill="black"/>
                <circle cx="60" cy="55" r="2.5" fill="black"/>
                <rect x="35" y="70" width="30" height="5" rx="2.5" fill="white"/>
                <rect x="20" y="55" width="5" height="20" rx="2.5" fill="#CBD5E1"/>
                <rect x="75" y="55" width="5" height="20" rx="2.5" fill="#CBD5E1"/>
            </svg>
        </div>
        <div id="bot-msg" class="bot-head">שלום! אני בובי, החבר החדש שלכם לכתיבה. מה נלמד היום?</div>
    </div>

    <div id="step1">
        <textarea id="diag-box" placeholder="כתבו כאן משפט (למשל: אני אלך לאכול)"></textarea>
        <button class="btn" onclick="startByDiag()">אבחון כתיבה 🔍</button>
        <button class="btn" style="background:#64748B" onclick="goToTopics()">בחירת תרגול ידנית ➔</button>
    </div>

    <div id="step2" class="hidden">
        <button class="btn" style="background:#16A34A" onclick="pickTopic('roots')">🌲 יער השורשים (ה/א, כ/ק)</button>
        <button class="btn" style="background:#2563EB" onclick="pickTopic('templates')">🏭 מפעל התבניות (תי/טי)</button>
        <button class="btn" style="background:#7C3AED" onclick="pickTopic('phonetic')">🦇 מערת הצלילים (א/ע, ט/ת)</button>
    </div>

    <div id="step3" class="hidden">
        <p>כמה שאלות תרצו?</p>
        <button class="btn" onclick="setLength(5)">5 שאלות</button>
        <button class="btn" onclick="setLength(10)">10 שאלות</button>
        <button class="btn" onclick="setLength(99)">הכל! 💪</button>
    </div>

    <div id="step4" class="hidden">
        <div id="q-text" class="sentence"></div>
        <div id="options-area"></div>
    </div>

    <div id="step5" class="hidden">
        <h2>סיימנו! 🏆</h2>
        <button class="btn" style="background:#64748B" onclick="document.getElementById('log').classList.toggle('hidden')">דוח להורים 📋</button>
        <div id="log" class="parent-log hidden"></div>
        <button class="btn" style="background:#22C55E" onclick="location.reload()">אימון חדש</button>
    </div>
</div>

<script>
    // בנק השאלות המלא (50 משפטים)
    const bank = {
        roots: [
            {q: "אבא ____ לעבודה", a: "הלך", opts: ["הלך", "אלך"], h: "משפחת הליכה מתחילה ב-ה'"},
            {q: "הילד ____ סיפור", a: "כותב", opts: ["כותב", "קוטב"], h: "כתיבה היא באות כ'"},
            {q: "אנחנו ____ לים", a: "הולכים", opts: ["הולכים", "אולכים"], h: "הולכים מתחיל ב-ה'"},
            {q: "שלחתי ____ לסבתא", a: "מכתב", opts: ["מכתב", "מקתב"], h: "מכתב הוא ב-כ'"},
            {q: "היא ____ מהר", a: "הלכה", opts: ["הלכה", "אלכה"], h: "הלכה מתחילה ב-ה'"},
            {q: "הסופר ____ ספר", a: "כתב", opts: ["כתב", "קתב"], h: "כתב הוא ב-כ'"},
            {q: "יצאנו ל____ בערב", a: "הליכה", opts: ["הליכה", "אליכה"], h: "הליכה כותבים ב-ה'"},
            {q: "הם ____ לביקור", a: "הלכו", opts: ["הלכו", "אלכו"], h: "הלכו ב-ה'"},
            {q: "אל ת____ לשם", a: "תלך", opts: ["תלך", "תלכ"], h: "בסוף תלך יש כ' סופית"},
            {q: "יש לי ____ יפה", a: "כתב", opts: ["כתב", "קתב"], h: "כתב יד ב-כ'"},
            {q: "אנחנו ____ ביומן", a: "כותבים", opts: ["כותבים", "קוטבים"], h: "כותבים ב-כ'"},
            {q: "הילד ____ לאיבוד", a: "הלך", opts: ["הלך", "אלך"], h: "הלך ב-ה'"},
            {q: "קיבלתי ____ חדש", a: "מכתב", opts: ["מכתב", "מקתב"], h: "מכתב ב-כ'"},
            {q: "היא ____ הודעה", a: "כותבת", opts: ["כותבת", "קוטבת"], h: "כותבת ב-כ'"},
            {q: "ה____ על הלוח", a: "כתובת", opts: ["כתובת", "קתובת"], h: "כתובת ב-כ'"},
            {q: "הם ____ במחברת", a: "כותבים", opts: ["כותבים", "קוטבים"], h: "כותבים ב-כ'"}
        ],
        templates: [
            {q: "אתמול אכל____ תפוח", a: "תי", opts: ["תי", "טי"], h: "אני בעבר זה תי"},
            {q: "שיחק____ בחצר", a: "תי", opts: ["תי", "טי"], h: "שיחקתי ב-תי"},
            {q: "רצ____ מהר מאוד", a: "תי", opts: ["תי", "טי"], h: "רצתי ב-תי"},
            {q: "קפצ____ לשלולית", a: "תי", opts: ["תי", "טי"], h: "קפצתי ב-תי"},
            {q: "ראי____ סרט מצחיק", a: "תי", opts: ["תי", "טי"], h: "ראיתי ב-תי"},
            {q: "בני____ מגדל", a: "תי", opts: ["תי", "טי"], h: "בניתי ב-תי"},
            {q: "שמע____ שיר", a: "תי", opts: ["תי", "טי"], h: "שמעתי ב-תי"},
            {q: "קני____ גלידה", a: "תי", opts: ["תי", "טי"], h: "קניתי ב-תי"},
            {q: "צייר____ ציור", a: "תי", opts: ["תי", "טי"], h: "ציירתי ב-תי"},
            {q: "ישנ____ מצוין", a: "תי", opts: ["תי", "טי"], h: "ישנתי ב-תי"},
            {q: "שתי____ מים", a: "תי", opts: ["תי", "טי"], h: "שתיתי ב-תי"},
            {q: "מצא____ מטבע", a: "תי", opts: ["תי", "טי"], h: "מצאתי ב-תי"},
            {q: "עלי____ על העץ", a: "תי", opts: ["תי", "טי"], h: "עליתי ב-תי"},
            {q: "הלכ____ לישון", a: "תי", opts: ["תי", "טי"], h: "הלכתי ב-תי"},
            {q: "סגר____ את הדלת", a: "תי", opts: ["תי", "טי"], h: "סגרתי ב-תי"},
            {q: "לבש____ חולצה", a: "תי", opts: ["תי", "טי"], h: "לבשתי ב-תי"}
        ],
        phonetic: [
            {q: "אני ____הב שוקולד", a: "או", opts: ["או", "עו"], h: "אוהב ב-א'"},
            {q: "באתי ____ם אמא", a: "עם", opts: ["עם", "אם"], h: "עם חברים ב-ע'"},
            {q: "ה____לפון מצלצל", a: "ט", opts: ["ט", "ת"], h: "טלפון ב-ט'"},
            {q: "קניתי ____יק חדש", a: "ת", opts: ["ת", "ט"], h: "תיק ב-ת'"},
            {q: "יש לי ____לב חמוד", a: "כ", opts: ["כ", "ק"], h: "כלב ב-כ'"},
            {q: "השמש ____ולה בבוקר", a: "ע", opts: ["ע", "א"], h: "לעלות זה ב-ע'"},
            {q: "אני ____וכל עכשיו", a: "או", opts: ["או", "עו"], h: "לאכול ב-א'"},
            {q: "יש ____נן בשמיים", a: "ע", opts: ["ע", "א"], h: "ענן ב-ע'"},
            {q: "ה____פוח אדום", a: "ת", opts: ["ת", "ט"], h: "תפוח ב-ת'"},
            {q: "השוקולד מת____ק", a: "וק", opts: ["וק", "וכ"], h: "מתוק ב-ק'"},
            {q: "ה____ור צהוב", a: "א", opts: ["א", "ע"], h: "אור ב-א'"},
            {q: "ה____וגה טעימה", a: "ע", opts: ["ע", "א"], h: "עוגה ב-ע'"},
            {q: "ה____ול צהוב בים", a: "ח", opts: ["ח", "כ"], h: "חול ב-ח'"},
            {q: "יש לי ____יק כבד", a: "ת", opts: ["ת", "ט"], h: "תיק ב-ת'"},
            {q: "ה____רח פורח", a: "פ", opts: ["פ", "כ"], h: "פרח ב-פ'"},
            {q: "אני ____וצה לשחק", a: "ר", opts: ["ר", "ע"], h: "רוצה ב-ר'"},
            {q: "ה____רנגול קורא", a: "ת", opts: ["ת", "ט"], h: "תרנגול ב-ת'"},
            {q: "אני ____וניה גדולה", a: "א", opts: ["א", "ע"], h: "אונייה ב-א'"}
        ]
    };

    let activePool = [], curIdx = 0, errors = [];
    const botVisual = document.getElementById('bot-visual');

    // פונקציית אנימציית קפיצה
    function botJump() {
        botVisual.classList.add('bot-jump');
        setTimeout(() => botVisual.classList.remove('bot-jump'), 500);
    }

    function goToTopics() {
        document.getElementById('step1').classList.add('hidden');
        document.getElementById('step2').classList.remove('hidden');
        document.getElementById('bot-msg').innerText = "בחרו נושא לתרגול:";
        botJump();
    }

    function startByDiag() {
        let txt = document.getElementById('diag-box').value;
        if(!txt) return;
        let t = 'phonetic';
        if(txt.includes('אלך') || txt.includes('כ')) t = 'roots';
        if(txt.includes('טי')) t = 'templates';
        pickTopic(t);
    }

    function pickTopic(t) {
        activePool = [...bank[t]].sort(() => Math.random() - 0.5);
        document.getElementById('step1').classList.add('hidden');
        document.getElementById('step2').classList.add('hidden');
        document.getElementById('step3').classList.remove('hidden');
        document.getElementById('bot-msg').innerText = "כמה שאלות נעשה הפעם?";
        botJump();
    }

    function setLength(n) {
        activePool = activePool.slice(0, n);
        document.getElementById('step3').classList.add('hidden');
        document.getElementById('step4').classList.remove('hidden');
        document.getElementById('x-btn').classList.remove('hidden');
        renderQ();
    }

    function renderQ() {
        if(curIdx >= activePool.length) return showResults();
        let item = activePool[curIdx];
        document.getElementById('bot-msg').innerText = "בחרו את המילה הנכונה:";
        document.getElementById('q-text').innerHTML = item.q.replace("____", "____");
        
        let optArea = document.getElementById('options-area');
        optArea.innerHTML = "";
        item.opts.forEach(o => {
            let b = document.createElement('button');
            b.className = "btn";
            b.style.background = "white"; b.style.color = "#6366F1"; b.style.border = "2px solid #6366F1";
            b.innerText = o;
            b.onclick = () => check(o, item);
            optArea.appendChild(b);
        });
    }

    function check(userAns, item) {
        if(userAns === item.a) {
            document.getElementById('q-text').innerHTML = item.q.replace("____", `<span class="correct-ans">${userAns}</span>`);
            document.getElementById('bot-msg').innerText = "מעולה! נכון מאוד. 🌟";
            botJump(); // קפיצת שמחה
            setTimeout(() => { curIdx++; renderQ(); }, 1200);
        } else {
            document.getElementById('q-text').innerHTML = item.q.replace("____", `<span class="wrong-ans">${userAns}</span>`);
            document.getElementById('bot-msg').innerText = item.h;
            errors.push(`המשפט: ${item.q.replace('____','___')} | בחר: ${userAns} | נכון: ${item.a}`);
        }
    }

    function showResults() {
        document.getElementById('step4').classList.add('hidden');
        document.getElementById('step5').classList.remove('hidden');
        document.getElementById('bot-msg').innerText = "כל הכבוד, סיימנו!";
        botJump();
        let reportDiv = document.getElementById('log');
        if(errors.length === 0) reportDiv.innerHTML = "🏆 מושלם! אפס טעויות. אתם אלופים!";
        else {
            reportDiv.innerHTML = "<b>טעויות לחיזוק:</b><br><br>";
            errors.forEach(e => {
                reportDiv.innerHTML += `• ${e}<br>`;
            });
        }
    }
</script>

</body>
</html>
