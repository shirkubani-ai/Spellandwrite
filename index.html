    <style>
        :root { --primary: #6366f1; --success: #22c55e; --error: #ef4444; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Assistant', sans-serif; background: #eef2ff; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; width: 100vw; overflow: hidden; }

        @media (min-width: 500px) { .app-container { height: 95vh; border-radius: 40px; border: 8px solid #fff; box-shadow: 0 20px 50px rgba(0,0,0,0.1); } }

        /* כפתור איקס בולט */
        #btn-exit { position: absolute; top: 15px; left: 15px; background: #fee2e2; color: #ef4444; border: 2px solid #ef4444; border-radius: 50%; width: 40px; height: 40px; font-weight: 800; cursor: pointer; z-index: 999; display: none; align-items: center; justify-content: center; font-size: 20px; }

        .bot-icon { width: 80px; height: 80px; margin: 0 auto 10px; background: #e0e7ff; border-radius: 50%; display: flex; justify-content: center; align-items: center; border: 3px solid var(--primary); }
        .bubble { background: var(--primary); color: white; border-radius: 20px; padding: 15px; margin-bottom: 20px; font-weight: 700; font-size: 1.1rem; min-height: 80px; display: flex; align-items: center; justify-content: center; }

        .sentence { font-size: 2rem; font-weight: 800; margin: 30px 0; color: #1e293b; line-height: 1.4; }
        .gap { border-bottom: 4px dashed var(--primary); padding: 0 10px; min-width: 50px; display: inline-block; }

        .is-correct { color: var(--success) !important; border-bottom: none !important; transition: 0.3s; }
        .is-wrong { color: var(--error) !important; border-bottom: none !important; animation: shake 0.4s; }
