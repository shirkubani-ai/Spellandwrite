<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>בובי - גרסה פשוטה</title>
    <style>
        body { font-family: sans-serif; background: #f0f4f8; text-align: center; margin: 0; padding: 20px; direction: rtl; }
        .box { background: white; max-width: 400px; margin: auto; padding: 20px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); position: relative; }
        .hidden { display: none; }
        .btn { background: #6366f1; color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; margin: 10px 0; font-size: 1.2rem; cursor: pointer; }
        .btn-exit { position: absolute; top: 10px; left: 10px; background: #ff4444; color: white; border: none; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; z-index: 10; }
        .bubble { background: #6366f1; color: white; padding: 15px; border-radius: 15px; margin-bottom: 20px; font-weight: bold; }
        .sentence { font-size: 1.5rem; margin: 20px 0; font-weight: bold; }
        .correct { color: #22c55e; border: 2px solid #22c55e; padding: 2px 10px; border-radius: 10px; }
        .wrong { color: #ef4444; border: 2px solid #ef4444; padding: 2px 10px; border-radius: 10px; }
        textarea { width: 100%; height: 60px; border-radius: 10px; border: 1px solid #ccc; padding: 10px; box-sizing: border-box; }
        .report { text-align: right; background: #eee; padding: 10px; border-radius: 10px; margin-top: 10px; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="box">
    <button id="exit" class="btn-exit hidden" onclick="location.reload()">X</button>
    <div id="msg" class="bubble">היי! אני בובי. מה נרצה לעשות?</div>

    <div id="s1">
        <textarea id="inp" placeholder="כתבו כאן לאבחון..."></textarea>
        <button class="btn" onclick="start('roots')">אבחון ובדיקה 🔍</button>
        <button class="btn" style="background:#94a3b8" onclick="showMap()">דילוג לבחירת אימון ➔</button>
    </div>

    <div id="s2" class="hidden">
        <button class="btn" style="background:#16a34a" onclick="prep('roots')">🌲 יער השורשים</button>
        <button class="btn" style="background:#2563eb" onclick="prep('templates')">🏭 מפעל התבניות</button>
        <button class="btn" style="background:#7c3aed" onclick="prep('phonetic')">🦇 מערת הצלילים</button>
    </div>

    <div id="s3" class="hidden">
        <p>כמה תרגילים?</p>
        <button class="btn" onclick="play(5)">5 תרגילים</button>
        <button class="btn" onclick="play(10)">10 תרגילים</button>
        <button class="btn" onclick="play(50)">הכל!</button>
    </div>

    <div id="s4" class="hidden">
        <div id="q-text" class="sentence"></div>
        <div id="options"></div>
    </div>

    <div id="s5" class="hidden">
        <h3>כל הכבוד! 🏆</h3>
        <button class="btn" onclick="document.getElementById('rep').classList.toggle('hidden')">דוח להורים</button>
        <div id="rep" class="report hidden"></div>
        <button class="btn" style="background:#22c55e" onclick="location.reload()">אימון חדש</button>
    </div>
</div>

<script>
    const bank = {
        roots: [
            {q:"אבא ____ לעבודה", a:"הלך", o:["הלך","אלך"], h:"הלך מתחיל ב-ה'"},
            {q:"הילד ____ סיפור", a:"כותב", o:["כותב","קוטב"], h:"כותבים ב-כ'"},
            {q:"היא ____ מהר", a:"הלכה", o:["הלכה","אלכה"], h:"הלכה ב-ה'"}
        ],
        templates: [
            {q:"אני אכל____", a:"תי", o:["תי","טי"], h:"אני בעבר זה תי"}
        ],
        phonetic: [
            {q:"אני ____הב", a:"או", o:["או","עו"], h:"אוהב ב-א'"}
        ]
    };

    let pool = [], idx = 0, errs = [];

    function showMap() {
        document.getElementById('s1').classList.add('hidden');
        document.getElementById('s2').classList.remove('hidden');
        document.getElementById('msg').innerText = "בחרו נושא:";
    }

    function start(z) { prep(z); }

    function prep(z) {
        pool = [...bank[z]].sort(() => Math.random() - 0.5);
        document.getElementById('s1').classList.add('hidden');
        document.getElementById('s2').classList.add('hidden');
        document.getElementById('s3').classList.remove('hidden');
        document.getElementById('msg').innerText = "כמות תרגילים:";
    }

    function play(n) {
        pool = pool.slice(0, n);
        document.getElementById('s3').classList.add('hidden');
        document.getElementById('s4').classList.remove('hidden');
        document.getElementById('exit').classList.remove('hidden');
        draw();
    }

    function draw() {
        if(idx >= pool.length) return end();
        const d = pool[idx];
        document.getElementById('q-text').innerHTML = d.q.replace("____", "<span>?</span>");
        document.getElementById('options').innerHTML = "";
        d.o.forEach(opt => {
            const b = document.createElement('button');
            b.className = "btn"; b.style.background = "white"; b.style.color = "#6366f1"; b.style.border = "2px solid #6366f1";
            b.innerText = opt;
            b.onclick = () => {
                if(opt === d.a) {
                    document.getElementById('q-text').innerHTML = d.q.replace("____", `<span class="correct">${opt}</span>`);
                    document.getElementById('msg').innerText = "נכון!";
                    setTimeout(() => { idx++; draw(); }, 1000);
                } else {
                    document.getElementById('q-text').innerHTML = d.q.replace("____", `<span class="wrong">${opt}</span>`);
                    document.getElementById('msg').innerText = d.h;
                    errs.push(`משפט: ${d.q} | טעות: ${opt}`);
                    setTimeout(() => { document.getElementById('q-text').innerHTML = d.q.replace("____", "<span>?</span>"); }, 1500);
                }
            };
            document.getElementById('options').appendChild(b);
        });
    }

    function end() {
        document.getElementById('s4').classList.add('hidden');
        document.getElementById('s5').classList.remove('hidden');
        document.getElementById('msg').innerText = "סיימנו!";
        document.getElementById('rep').innerHTML = errs.length ? errs.join("<br>") : "אין טעויות!";
    }
</script>
</body>
</html>
